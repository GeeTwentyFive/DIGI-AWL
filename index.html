<script>
        if (!('NDEFReader' in window)) {
                document.write("ERROR: Browser does not support Web NFC API")
                window.stop()
        }

        const CIPHER_OFFSET = -30;
        const INTEGRITY_CHECK_STRING = "DAL_";

        async function write_tag() {
                const output = text => {document.querySelector("#write_status").innerHTML = text;};

                let write_data = document.querySelector("#write_data").value;
                write_data = INTEGRITY_CHECK_STRING + write_data;

                let ciphered_write_data = "";
                for (c of write_data) {
                        ciphered_write_data += String.fromCharCode(c.charCodeAt(0) + CIPHER_OFFSET)
                }

                const ndef = new NDEFReader();
                ndef.write(ciphered_write_data).then(() => {
                        output("Written: " + write_data)
                }).catch(error => {
                        output("ERROR: Failed to write data")
                })
        }

        function read_tag() {
                const output = text => {document.querySelector("#read_data").innerHTML = text;};

                const ndef = new NDEFReader();
                ndef.scan().then(() => {
                        output("Scanning...");

                        ndef.onreadingerror = () => {
                                output("ERROR: Failed to read data from tag");
                                return;
                        };

                        ndef.onreading = event => {
                                if (event.message.records.length == 0) {
                                        output("Tag is empty");
                                        return;
                                }

                                let ciphered_read_data = (new TextDecoder()).decode(event.message.records[0].data);

                                let read_data = "";
                                for (c of ciphered_read_data) {
                                        read_data += String.fromCharCode(c.charCodeAt(0) - CIPHER_OFFSET)
                                }

                                if (read_data.slice(0, INTEGRITY_CHECK_STRING.length) != INTEGRITY_CHECK_STRING) {
                                        output("ERROR: Invalid data on tag");
                                        return;
                                }

                                output(read_data.slice(INTEGRITY_CHECK_STRING.length));

                                return;
                        };
                }).catch(err => {
                        output(`ERROR: Failed to start scan - ${err}`);
                        return;
                });
        }
</script>

<style>body {zoom: 2;}</style>

<label for="write_data">Name/data to write:</label><br>
<input id="write_data" name="write_data"><br>
<br>
<button onclick="write_tag()">Write</button><br>
<p id="write_status">-</p><br>

<br>

<button onclick="read_tag()">Read</button><br>
<p id="read_data">-</p><br>
